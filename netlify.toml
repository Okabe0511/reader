[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/dict/*"
  to = "https://dict.youdao.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/fanyi/*"
  to = "https://fanyi.youdao.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
